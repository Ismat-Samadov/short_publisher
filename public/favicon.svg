<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark forest background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a1a12"/>

  <!-- Tree trunk -->
  <rect x="27" y="14" width="10" height="34" rx="2"
    fill="url(#trunk)" />

  <!-- Branch left -->
  <rect x="10" y="24" width="18" height="6" rx="2" fill="#5c3311"/>
  <circle cx="10" cy="27" r="6" fill="#16a34a"/>

  <!-- Branch right -->
  <rect x="36" y="36" width="18" height="6" rx="2" fill="#5c3311"/>
  <circle cx="54" cy="39" r="6" fill="#22c55e"/>

  <!-- Stump base -->
  <rect x="22" y="48" width="20" height="8" rx="3" fill="#3b1e08"/>

  <!-- Axe handle -->
  <rect x="18" y="40" width="16" height="4" rx="2" fill="#78350f" transform="rotate(-30 26 42)"/>
  <!-- Axe head -->
  <path d="M8 38 L16 34 L18 42 Z" fill="#9ca3af"/>
  <path d="M8 46 L16 42 L18 38 L8 38 Z" fill="#6b7280"/>

  <defs>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a2510"/>
      <stop offset="40%" stop-color="#8b4513"/>
      <stop offset="60%" stop-color="#a0522d"/>
      <stop offset="100%" stop-color="#4a2510"/>
    </linearGradient>
  </defs>
</svg>
