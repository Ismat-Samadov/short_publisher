name: Publish YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'       # Daily at 9:00 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skips YouTube upload, tests everything else'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-open-sans

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        working-directory: scripts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          PIPELINE_SECRET_KEY: ${{ secrets.PIPELINE_SECRET_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}

          FAL_KEY: ${{ secrets.FAL_KEY }}

          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          BACKGROUND_MUSIC_URL: ${{ secrets.BACKGROUND_MUSIC_URL }}

        run: python pipeline.py
